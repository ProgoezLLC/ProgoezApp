<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progoez HR Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a2f42;--accent:#4f8ef7;--accent2:#7c5cfc;--green:#22c55e;--orange:#f59e0b;--red:#ef4444;--cyan:#06b6d4;--pink:#ec4899;--text:#e8eaf2;--muted:#6b7280;--muted2:#9ca3af;--card:#1a1f2e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,rgba(79,142,247,0.12) 0%,transparent 60%),
  radial-gradient(ellipse at 80% 80%,rgba(124,92,252,0.1) 0%,transparent 60%),var(--bg);}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px;width:460px;position:relative;overflow:hidden;}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:36px;}
.brand-logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;}
.brand-name{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.login-title{font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px;}
.login-sub{color:var(--muted);font-size:14px;margin-bottom:28px;}
.field{margin-bottom:16px;}
.field-label{font-size:11px;color:var(--muted2);margin-bottom:6px;letter-spacing:0.6px;font-weight:700;text-transform:uppercase;}
.field input{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--accent);}
.demo-hint{font-size:11px;color:var(--muted);margin-top:5px;font-family:'DM Mono',monospace;line-height:1.7;}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.1s;margin-top:4px;}
.btn-primary:hover{opacity:0.9;}
.login-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none;}

/* TOPBAR */
.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;}
.topbar-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.topbar-name{font-size:16px;font-weight:700;letter-spacing:-0.3px;}
.topbar-spacer{flex:1;}
.topbar-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:13px;display:flex;align-items:center;gap:8px;}
.role-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;}
.role-employee{background:rgba(79,142,247,0.15);color:var(--accent);}
.role-manager{background:rgba(34,197,94,0.15);color:var(--green);}
.role-hradmin{background:rgba(245,158,11,0.15);color:var(--orange);}
.role-superadmin{background:rgba(124,92,252,0.15);color:var(--accent2);}
.topbar-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;}
.btn-logout{padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}

/* LAYOUT */
#app{min-height:100vh;flex-direction:column;}
.app-body{display:flex;flex:1;}
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:2px;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;flex-shrink:0;}
.sidebar-section{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:14px 12px 5px;font-weight:700;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:all 0.15s;font-size:14px;color:var(--muted2);font-weight:500;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:rgba(79,142,247,0.12);color:var(--accent);}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.main{flex:1;padding:28px;overflow-y:auto;}
.page-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;}
.page-sub{font-size:14px;color:var(--muted);margin-bottom:24px;}
.section-title{font-size:15px;font-weight:700;margin-bottom:14px;}

/* CARDS & GRIDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;}
.stat-val{font-size:30px;font-weight:700;letter-spacing:-1px;font-family:'DM Mono',monospace;}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px;font-weight:500;}
.stat-icon{font-size:22px;margin-bottom:10px;}

/* LEAVE STRIP */
.leave-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.leave-tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.leave-tile-num{font-size:28px;font-weight:700;letter-spacing:-1px;font-family:'DM Mono',monospace;}
.leave-tile-label{font-size:11px;color:var(--muted);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.leave-tile-used{font-size:11px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace;}

/* PROFILE */
.profile-header{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;display:flex;gap:20px;align-items:flex-start;margin-bottom:18px;position:relative;overflow:hidden;}
.profile-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.profile-avatar{width:72px;height:72px;border-radius:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;}
.profile-name{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
.profile-title-text{font-size:13px;color:var(--muted);margin:3px 0 10px;}
.profile-tags{display:flex;gap:8px;flex-wrap:wrap;}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;border:1px solid;}
.tag-blue{border-color:rgba(79,142,247,0.3);color:var(--accent);background:rgba(79,142,247,0.08);}
.tag-green{border-color:rgba(34,197,94,0.3);color:var(--green);background:rgba(34,197,94,0.08);}
.tag-orange{border-color:rgba(245,158,11,0.3);color:var(--orange);background:rgba(245,158,11,0.08);}
.tag-muted{border-color:var(--border);color:var(--muted2);background:transparent;}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;}
.profile-field{padding:13px 0;border-bottom:1px solid var(--border);}
.profile-field:nth-child(odd){padding-right:24px;}
.profile-field:nth-child(even){padding-left:24px;border-left:1px solid var(--border);}
.pf-label{font-size:10px;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px;font-weight:700;}
.pf-val{font-size:14px;font-weight:500;}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;color:var(--muted2);margin-bottom:6px;display:block;letter-spacing:0.6px;font-weight:700;text-transform:uppercase;}
.form-input{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--accent);}
select.form-input{cursor:pointer;}
textarea.form-input{resize:vertical;min-height:80px;}
.btn-submit{padding:10px 24px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s;}
.btn-submit:hover{opacity:0.88;}
.btn-sm{padding:5px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:opacity 0.2s;}
.btn-sm:hover{opacity:0.8;}
.btn-green{background:rgba(34,197,94,0.15);color:var(--green);}
.btn-red{background:rgba(239,68,68,0.15);color:var(--red);}
.btn-blue{background:rgba(79,142,247,0.15);color:var(--accent);}

/* TABLES */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;padding:10px 14px;font-size:10px;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:700;white-space:nowrap;}
tbody td{padding:12px 14px;border-bottom:1px solid rgba(42,47,66,0.5);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(79,142,247,0.025);}
.status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.3px;white-space:nowrap;}
.status-pending{background:rgba(245,158,11,0.12);color:var(--orange);}
.status-approved{background:rgba(34,197,94,0.12);color:var(--green);}
.status-rejected{background:rgba(239,68,68,0.12);color:var(--red);}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.emp-row-id{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px;}

/* ATTENDANCE */
.att-cell{display:inline-flex;align-items:center;justify-content:center;width:28px;height:22px;border-radius:4px;font-size:11px;font-weight:700;cursor:default;}
.att-P{background:rgba(34,197,94,0.15);color:var(--green);}
.att-A{background:rgba(239,68,68,0.15);color:var(--red);}
.att-CL{background:rgba(79,142,247,0.15);color:var(--accent);}
.att-SL{background:rgba(6,182,212,0.15);color:var(--cyan);}
.att-WO{background:rgba(42,47,66,0.5);color:var(--muted);}
.att-HD{background:rgba(245,158,11,0.15);color:var(--orange);}
.att-PH,.att-DH,.att-NH{background:rgba(124,92,252,0.15);color:var(--accent2);}
.att-NA{background:transparent;color:var(--border);}
.att-blank{background:rgba(34,197,94,0.1);color:rgba(34,197,94,0.5);}

/* HOLIDAYS */
.holiday-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:16px;margin-bottom:10px;}
.holiday-date-box{background:var(--surface2);border-radius:8px;padding:8px 12px;text-align:center;flex-shrink:0;min-width:60px;}
.holiday-day{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
.holiday-month{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.holiday-name{font-size:14px;font-weight:600;}
.holiday-weekday{font-size:12px;color:var(--muted);margin-top:2px;}
.holiday-type-pill{margin-left:auto;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:0.5px;}
.holiday-fixed{background:rgba(34,197,94,0.12);color:var(--green);}
.holiday-optional{background:rgba(245,158,11,0.12);color:var(--orange);}
.holiday-shift-day{background:rgba(79,142,247,0.12);color:var(--accent);}
.holiday-shift-night{background:rgba(124,92,252,0.12);color:var(--accent2);}

/* INCENTIVE */
.incentive-slab{display:grid;grid-template-columns:1fr 1fr;gap:2px;border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px;}
.incentive-slab-header{grid-column:1/-1;background:var(--surface2);padding:10px 14px;font-size:12px;font-weight:700;color:var(--muted2);letter-spacing:0.5px;text-transform:uppercase;}
.slab-row{display:contents;}
.slab-cell{padding:9px 14px;font-size:13px;background:var(--card);}
.slab-cell:nth-child(odd){border-right:1px solid var(--border);}
.slab-cell.highlight{background:rgba(79,142,247,0.06);}

/* DIRECTORY */
.dir-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
.dir-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;gap:12px;align-items:flex-start;transition:border-color 0.2s,transform 0.15s;}
.dir-card:hover{border-color:rgba(79,142,247,0.5);transform:translateY(-1px);}
.dir-avatar{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;}
.dir-dept-chip{font-size:11px;color:var(--accent);background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.2);padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px;}

/* NOTIF */
.notif-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;}
.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.notif-unread{background:var(--accent);}
.notif-read-dot{background:var(--border);}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-size:14px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none;z-index:9999;max-width:340px;}

/* DASHBOARD INCENTIVE CARD */
.inc-summary-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;}
.inc-amount{font-size:32px;font-weight:700;letter-spacing:-1px;font-family:'DM Mono',monospace;color:var(--green);}
.inc-pending{font-size:32px;font-weight:700;letter-spacing:-1px;font-family:'DM Mono',monospace;color:var(--orange);}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}
.lb-row:last-child{border-bottom:none;}
.lb-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.lb-rank-1{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;}
.lb-rank-2{background:linear-gradient(135deg,#94a3b8,#cbd5e1);color:#000;}
.lb-rank-3{background:linear-gradient(135deg,#b45309,#d97706);color:#fff;}
.lb-rank-other{background:var(--surface2);color:var(--muted);}

@media(max-width:1100px){.grid4{grid-template-columns:1fr 1fr;}.leave-strip{grid-template-columns:1fr 1fr;}.dir-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:768px){.sidebar{display:none;}.grid3{grid-template-columns:1fr;}.form-row{grid-template-columns:1fr;}}

.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface2);padding:4px;border-radius:10px;width:fit-content;}
.tab{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted2);transition:all 0.15s;}
.tab.active{background:var(--surface);color:var(--text);}
.divider{height:1px;background:var(--border);margin:16px 0;}
.badge-pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;}
.info-box{background:rgba(79,142,247,0.07);border:1px solid rgba(79,142,247,0.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--muted2);margin-bottom:16px;line-height:1.6;}
.warn-box{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--orange);margin-bottom:16px;}
</style>
</head>

function getEmp(id){return EMPLOYEES.find(e=>e.empId===id);}
function getEmpByEmail(email){return EMPLOYEES.find(e=>e.email===email);}
function initials(e){if(!e)return'?';return((e.firstName||'')[0]+(e.lastName||'')[0]||'').toUpperCase();}
function fmtDate(d){if(!d)return'—';const dt=new Date(d);return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000)+1;}
function greeting(){const h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening';}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
const COLORS=['#4f8ef7','#22c55e','#f59e0b','#ef4444','#7c5cfc','#06b6d4','#ec4899','#f97316','#a855f7','#14b8a6'];
function empColor(id){const n=parseInt((id||'0').replace(/\D/g,''))%COLORS.length;return COLORS[n];}
function toast(msg,type='info'){
  const t=document.getElementById('toast');
  t.innerHTML=(type==='success'?'✅ ':type==='error'?'❌ ':'ℹ️ ')+msg;
  t.style.display='block';
  t.style.borderColor=type==='success'?'rgba(34,197,94,0.4)':type==='error'?'rgba(239,68,68,0.4)':'var(--border)';
  clearTimeout(t._timer);t._timer=setTimeout(()=>{t.style.display='none';},3500);
}
function addNotif(empId,msg){NOTIFICATIONS.unshift({id:Date.now(),empId,msg,time:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),read:false});}
function pendingCount(id){
  if(id==='approvals')return LEAVES.filter(l=>l.status==='pending').length;
  if(id==='am-approvals')return AM_INCENTIVES.filter(i=>i.status==='pending').length;
  if(id==='bd-approvals')return BD_INCENTIVES.filter(i=>i.status==='pending').length;
  if(id==='notifications')return NOTIFICATIONS.filter(n=>n.empId===currentUser.empId&&!n.read).length;
  return 0;
}
function getLeaveBalance(empId,type){
  const base=LEAVE_BALANCES[empId]||{CL:2,SL:1};
  const used=LEAVES.filter(l=>l.empId===empId&&l.type===type&&l.status==='approved').reduce((s,l)=>s+l.days,0);
  const bal=base[type]||0;
  return{balance:Math.max(0,bal-used),used,base:bal};
}

// Attendance helper: get status for a day
function getAttStatus(empId,day){
  const att=ATTENDANCE[empId]||{};
  if(att[day]!==undefined)return att[day];
  // Default: blank = P (present) on working days (Mon-Fri), WO on Sat/Sun
  const d=new Date(2026,3,day); // April 2026
  if(d.getDay()===0||d.getDay()===6)return 'WO';
  return 'P';
}

function attCell(code){
  const label=code||'P';
  const cls=`att-${label}`;
  return`<span class="att-cell ${cls}" title="${label}">${label}</span>`;
}

      </div>
    </div>

      <label class="form-label">Duration</label>
      <input class="form-input" id="lv-days" readonly style="opacity:0.65;cursor:default" placeholder="Select dates to calculate" />

      <label class="form-label">Reason</label>

function updateLvBalance(){
  const t=document.getElementById('lv-type');const b=document.getElementById('lv-balance');
  if(!t||!b)return;
  const bal=getLeaveBalance(currentUser.empId,t.value);
  b.value=bal.balance+' days remaining';
}
function calcDays(){
  const f=document.getElementById('lv-from')?.value;
  const t=document.getElementById('lv-to')?.value;
  const el=document.getElementById('lv-days');if(!el)return;
  if(f&&t&&t>=f){const d=daysBetween(f,t);el.value=d+' day'+(d!==1?'s':'');}
  else el.value='';
  updateLvBalance();
}
function submitLeave(){
  const type=document.getElementById('lv-type').value;
  const from=document.getElementById('lv-from').value;
  const to=document.getElementById('lv-to').value;
  const reason=document.getElementById('lv-reason').value.trim();
  if(!from||!to){toast('Please select dates','error');return;}
  if(to<from){toast('To date must be on/after from date','error');return;}
  if(!reason){toast('Please provide a reason','error');return;}
  const days=daysBetween(from,to);
  const bal=getLeaveBalance(currentUser.empId,type);
  if(days>bal.balance){toast(`Insufficient balance. You have ${bal.balance} day(s).`,'error');return;}
  const id='LV0'+String(lvCounter++).padStart(2,'0');
  LEAVES.push({id,empId:currentUser.empId,type,from,to,days,reason,status:'pending',appliedOn:new Date().toISOString().slice(0,10),comment:''});
  addNotif('PGHR001',`${currentUser.firstName} ${currentUser.lastName} applied for ${type==='CL'?'Casual':'Sick'} Leave (${days}d): ${fmtDate(from)}.`);
  toast('Leave application submitted!','success');
  navigate('my-leaves');
}

// ═══════════════════════════════════════════════════════
// ATTENDANCE
// ═══════════════════════════════════════════════════════
function renderAttendance(){
  const emp=currentUser;
  const isAdmin=emp.role==='hradmin'||emp.role==='superadmin';
  const isManager=emp.role==='manager'||isAdmin;
  const days=Array.from({length:30},(_,i)=>i+1);
  const weekdays=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // April 2026 day headers
  const headers=days.map(d=>{const dt=new Date(2026,3,d);return`<th style="min-width:36px;text-align:center"><div>${d}</div><div style="font-size:9px;color:var(--muted)">${weekdays[dt.getDay()]}</div></th>`;}).join('');

  function empAttRow(e){
    if(!e.active&&e.role!=='manager'&&e.role!=='superadmin'&&e.role!=='hradmin')return'';
    const cells=days.map(d=>{ const s=getAttStatus(e.empId,d); return`<td style="text-align:center;padding:6px 2px">${attCell(s)}</td>`;}).join('');
    return`<tr><td style="white-space:nowrap;padding:8px 14px"><div style="font-weight:600;font-size:13px">${e.firstName} ${e.lastName}</div><div class="emp-row-id">${e.empId}</div></td>${cells}</tr>`;
  }

  if(isAdmin||isManager){
    const empList=isAdmin?EMPLOYEES.filter(e=>e.active):EMPLOYEES.filter(e=>e.active);
    return`
    <div class="page-title">Attendance — April 2026</div>
    <div class="page-sub">Month-wise attendance for all active employees. Blank = Present (working day).</div>
    <div class="info-box">Legend: <span class="att-cell att-P">P</span> Present &nbsp; <span class="att-cell att-A">A</span> Absent &nbsp; <span class="att-cell att-CL">CL</span> Casual Leave &nbsp; <span class="att-cell att-SL">SL</span> Sick Leave &nbsp; <span class="att-cell att-WO">WO</span> Weekend Off &nbsp; <span class="att-cell att-HD">HD</span> Half Day &nbsp; <span class="att-cell att-DH">DH</span> Day Shift Holiday &nbsp; <span class="att-cell att-NH">NH</span> Night Shift Holiday</div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table>
          <thead><tr><th style="min-width:160px">Employee</th>${headers}</tr></thead>
          <tbody>${empList.map(empAttRow).join('')}</tbody>
        </table>
      </div>
    </div>`;
  } else {
    // Employee sees their own
    const cells=days.map(d=>{const s=getAttStatus(emp.empId,d);const dt=new Date(2026,3,d);return`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px">${d} Apr (${weekdays[dt.getDay()]})</span>
      ${attCell(s)}
    </div>`;}).join('');
    const presents=days.filter(d=>getAttStatus(emp.empId,d)==='P').length;
    const absents=days.filter(d=>getAttStatus(emp.empId,d)==='A').length;
    const leaves=days.filter(d=>['CL','SL'].includes(getAttStatus(emp.empId,d))).length;
    return`
    <div class="page-title">My Attendance — April 2026</div>
    <div class="page-sub">Your daily attendance record for this month.</div>
    <div class="grid3">
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val" style="color:var(--green)">${presents}</div><div class="stat-label">Days Present</div></div>
      <div class="stat-card"><div class="stat-icon">❌</div><div class="stat-val" style="color:var(--red)">${absents}</div><div class="stat-label">Days Absent</div></div>
      <div class="stat-card"><div class="stat-icon">🏖️</div><div class="stat-val" style="color:var(--accent)">${leaves}</div><div class="stat-label">Leave Days</div></div>
    </div>
    <div class="card">${cells}</div>`;
  }
}

function calcAMIncentive(data){
  // Upsell incentive
  let totalUsd=0;
  data.upsells.forEach(u=>{
    if(u.type==='recurring'){totalUsd+=u.usd/6;}
    else {totalUsd+=u.usd;}
  });
  let slab=totalUsd<=500?5:totalUsd<=1500?10:15;
  let upsellIncentive=Math.round(totalUsd*slab);
  // Payment status adjustment
  const allFull=data.upsells.every(u=>u.payStatus==='full');
  const anyPartial=data.upsells.some(u=>u.payStatus==='partial');
  if(anyPartial)upsellIncentive=Math.round(upsellIncentive*0.5);
  if(data.upsells.some(u=>u.payStatus==='none'))upsellIncentive=0;

  // Retention incentive (from 3rd month)
  let retentionIncentive=0;
  const pv=data.portfolioValue||0;
  const ret=data.retentionPct||0;
  if(ret>=85){
    if(pv<=5000){retentionIncentive=3000;}
    else if(ret>=96){retentionIncentive=12000;}
    else if(ret>=91){retentionIncentive=8000;}
    else if(ret>=89){retentionIncentive=6000;}
    else {retentionIncentive=4000;}
  }

  // Advocacy
  let advocacyIncentive=0;
  if(ret>=85){
    (data.advocacies||[]).forEach(a=>{
      if(a.approved){advocacyIncentive+=a.type==='video'?500:300;}
    });
  }
  return{upsellIncentive,retentionIncentive,advocacyIncentive,total:upsellIncentive+retentionIncentive+advocacyIncentive,usdTotal:totalUsd,slab};
}

const BD_PLANS={
  Silver:590,Gold:990,Platinum:1890,Classic:2890,Signature:3490,Diamond:4990
};
const DAILY_MULTIPLIERS={
  '>40%':0,'40%':1.0,'35%':1.5,'30%':2.0,'25%':2.5,'20%':3.0,'15%':3.5,'10%':4.0,'5%':4.5,'0%':5.0
};
function calcDailyIncentive(planUsd,discountPct){
  if(discountPct>40)return 0;
  let slabKey;
  if(discountPct<=0)slabKey='0%';
  else if(discountPct<=5)slabKey='5%';
  else if(discountPct<=10)slabKey='10%';
  else if(discountPct<=15)slabKey='15%';
  else if(discountPct<=20)slabKey='20%';
  else if(discountPct<=25)slabKey='25%';
  else if(discountPct<=30)slabKey='30%';
  else if(discountPct<=35)slabKey='35%';
  else slabKey='40%';
  return Math.round(planUsd*DAILY_MULTIPLIERS[slabKey]);
}
const MONTHLY_SLABS=[
  {min:990,max:1500,payout:2500,level:'Unsatisfactory'},
  {min:1501,max:2000,payout:5000,level:'Needs Improvement'},
  {min:2001,max:2500,payout:9000,level:'Satisfactory'},
  {min:2501,max:3000,payout:14000,level:'Good'},
  {min:3001,max:3500,payout:18000,level:'Very Good'},
  {min:3501,max:4000,payout:25000,level:'Excellent'},
  {min:4001,max:4500,payout:30000,level:'Fabulous'},
  {min:4501,max:5000,payout:40000,level:'Fabulous'},
  {min:5001,max:5500,payout:55000,level:'Fabulous'},
  {min:5501,max:6000,payout:80000,level:'Extraordinary'},
  {min:6001,max:999999,payout:110000,level:'Extraordinary'},
];
function calcMonthlyIncentive(totalUsd){
  const slab=MONTHLY_SLABS.find(s=>totalUsd>=s.min&&totalUsd<=s.max);
  return slab?{payout:slab.payout,level:slab.level}:{payout:0,level:'Below Minimum'};
}

  </div>`).join('');

function recalcBD(){
  // Recurring
  let totalRecurring=0;let dailyTotal=0;
  bdSales.forEach(s=>{
    if(s.type==='recurring'){totalRecurring+=s.usd;}
    else{totalRecurring+=s.usd/6;}
    if(s.discount<=40){dailyTotal+=calcDailyIncentive(s.usd,s.discount);}
  });
  // Monthly incentive
  const qualifies=totalRecurring>=990;
  const monthly=qualifies?calcMonthlyIncentive(totalRecurring):{payout:0,level:'Below Minimum ($990 required)'};
  // Web incentives
  let webMonthly=0;let webDaily=0;
  bdWebSales.forEach(s=>{
    webMonthly+=Math.round(s.tsv*1.5);
    webDaily+=s.fpv;
  });
  const el=document.getElementById('bd-calc-result');
  if(el){
    el.style.display='block';
    el.innerHTML=`
    <strong>Estimated Incentive Breakdown</strong><br>
    Total Recurring USD: <strong>$${totalRecurring.toFixed(0)}</strong> ${qualifies?'✅':'❌ (min $990 required)'}<br>
    Daily Incentive (recurring): <strong>₹${dailyTotal.toLocaleString('en-IN')}</strong><br>
    Monthly Incentive: <strong>₹${monthly.payout.toLocaleString('en-IN')}</strong> <span style="color:var(--muted)">(${monthly.level})</span><br>
    ${webMonthly>0?`Web Monthly: <strong>₹${webMonthly.toLocaleString('en-IN')}</strong><br>Web Daily: <strong>₹${webDaily.toLocaleString('en-IN')}</strong><br>`:''}
    <span style="color:var(--green);font-size:16px;font-weight:700">Total: ₹${(dailyTotal+monthly.payout+webMonthly+webDaily).toLocaleString('en-IN')}</span>
    <span style="color:var(--muted);font-size:11px;margin-left:8px">(Pending manager approval)</span>`;
  }
}
function submitBDIncentive(){
  const month=document.getElementById('bd-month')?.value;
  if(!month){toast('Select a month','error');return;}
  if(bdSales.length===0&&bdWebSales.length===0){toast('Add at least one sale','error');return;}
  let totalRecurring=0;let dailyTotal=0;
  bdSales.forEach(s=>{totalRecurring+=s.type==='recurring'?s.usd:s.usd/6;dailyTotal+=calcDailyIncentive(s.usd,s.discount);});
  const monthly=totalRecurring>=990?calcMonthlyIncentive(totalRecurring):{payout:0};
  let webMonthly=0;let webDaily=0;
  bdWebSales.forEach(s=>{webMonthly+=Math.round(s.tsv*1.5);webDaily+=s.fpv;});
  const id='BDI0'+String(bdiCounter++).padStart(2,'0');
  BD_INCENTIVES.push({id,empId:currentUser.empId,month,sales:[...bdSales],webSales:[...bdWebSales],totalRecurring,status:'pending',submittedOn:new Date().toISOString().slice(0,10),managerComment:'',dailyIncentive:dailyTotal+webDaily,monthlyIncentive:monthly.payout+webMonthly});
  addNotif('PGHR001',`${currentUser.firstName} submitted BD incentive for ${month}.`);
  bdSales=[];bdWebSales=[];
  toast('Submitted for approval!','success');navigate('bd-incentive');
}

      ${[...new Set(EMPLOYEES.filter(e=>e.active).map(e=>e.dept))].map(d=>{
        const count=EMPLOYEES.filter(e=>e.active&&e.dept===d).length;
        return`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px"><span>${d}</span><span style="font-weight:700;color:var(--accent)">${count}</span></div>`;
      }).join('')}
    </div>
  </div>`;
}
</script>
</body>
</html>
